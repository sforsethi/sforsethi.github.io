<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track BMI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f2f2f7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 48px 36px;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1c1c1e;
      margin-bottom: 8px;
    }
    p {
      font-size: 16px;
      color: #6e6e73;
      line-height: 1.5;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      background: #007aff;
      color: white;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 600;
    }
    .btn:hover { background: #0066d6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⚖️</div>
    <h1>Track BMI</h1>
    <p>Track your BMI, monitor trends, and reach your health goals.</p>
    <a class="btn" href="https://apps.apple.com/app/id<!-- ADD YOUR APP STORE ID HERE -->">
      Download on the App Store
    </a>
  </div>
</body>
</html>
